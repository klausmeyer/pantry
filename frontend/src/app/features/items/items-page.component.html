<section class="mb-4 flex flex-wrap items-center gap-3">
  <label class="form-control w-60">
    <div class="label py-1">
      <span class="label-text">Sort by</span>
    </div>
    <select class="select select-bordered select-sm" [value]="sortBy" (change)="onSortByChange($any($event.target).value)">
      <option value="name">Name</option>
      <option value="best_before">Best before</option>
      <option value="created_at">Created at</option>
      <option value="updated_at">Updated at</option>
    </select>
  </label>
  <button class="btn btn-sm btn-outline mt-6" type="button" (click)="toggleSortOrder()">
    Order: {{ sortOrder === 'asc' ? 'ASC' : 'DESC' }}
  </button>
</section>

<section class="alert mb-4 shadow-lg" *ngIf="loading">
  <span>Loading items...</span>
</section>
<section class="alert alert-error mb-4 shadow-lg" *ngIf="!loading && error">
  <span>{{ error }}</span>
</section>

<section class="grid grid-cols-[repeat(auto-fit,minmax(240px,1fr))] gap-4" *ngIf="!loading && !error">
  <article class="card bg-base-200 shadow-xl" *ngFor="let item of items">
    <div class="card-body">
      <div class="badge self-start" [class]="bestBeforeBadgeClass(item.bestBefore)">
        {{ bestBeforeLabel(item.bestBefore) }}
      </div>
      <h2 class="card-title">{{ item.name }}</h2>
      <div class="flex flex-wrap items-center gap-2">
        <div class="badge badge-secondary badge-outline font-mono">
          {{ item.contentAmount }} {{ item.contentUnit }}
        </div>
        <div class="badge badge-accent badge-outline">{{ item.packaging }}</div>
      </div>
      <p>Best before: {{ item.bestBefore }}</p>
      <p *ngIf="item.comment">{{ item.comment }}</p>
    </div>
  </article>

  <article class="card border border-dashed border-base-content/30 bg-base-200" *ngIf="items.length === 0">
    <div class="card-body">
      <h2 class="card-title">No items yet</h2>
      <p>Create your first item through the API and refresh.</p>
    </div>
  </article>
</section>
