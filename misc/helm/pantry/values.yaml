nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

backend:
  replicaCount: 1
  image:
    repository: klausmeyer/pantry-backend
    pullPolicy: IfNotPresent
    tag: latest
  service:
    type: ClusterIP
    port: 4000
  env:
    HTTP_ADDR: ":4000"
    DB_HOST: "postgres.example.internal"
    DB_PORT: "5432"
    DB_NAME: "pantry"
    DB_USER: "pantry"
    DB_SSLMODE: "require"
    S3_ENDPOINT: "https://s3.example.internal"
    S3_REGION: "eu-central-1"
    S3_BUCKET: "pantry"
    S3_USE_PATH_STYLE: "false"
  credentials:
    # Set to reference an existing Secret instead of creating a SealedSecret.
    existingSecretName: ""
    keys:
      dbPassword: DB_PASSWORD
      s3AccessKeyId: S3_ACCESS_KEY_ID
      s3SecretAccessKey: S3_SECRET_ACCESS_KEY
  extraEnv: []
  extraEnvFrom: []
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

sealedSecrets:
  backendCredentials:
    enabled: false
    # If empty, defaults to "<release>-pantry-backend-credentials".
    name: ""
    encryptedData: {}
    # Example:
    # encryptedData:
    #   DB_PASSWORD: Ag...
    #   S3_ACCESS_KEY_ID: Ag...
    #   S3_SECRET_ACCESS_KEY: Ag...

frontend:
  replicaCount: 1
  image:
    repository: klausmeyer/pantry-frontend
    pullPolicy: IfNotPresent
    tag: latest
  service:
    type: ClusterIP
    port: 80
  # Optional override. If empty, defaults to "<release>-pantry-backend:4000".
  backendUpstream: ""
  env: {}
  extraEnv: []
  extraEnvFrom: []
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: pantry.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
