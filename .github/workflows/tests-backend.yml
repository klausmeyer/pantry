name: tests-backend

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/tests-backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/tests-backend.yml"
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Run tests
        working-directory: backend
        run: go test ./...
