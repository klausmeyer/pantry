name: build-helm-chart

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests_backend:
    uses: ./.github/workflows/tests-backend.yml
  tests_frontend:
    uses: ./.github/workflows/tests-frontend.yml

  chart_version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.chart_version.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check chart version change
        id: chart_version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          # If this is the first push or base is missing, treat as changed.
          if [[ -z "${base_sha}" || "${base_sha}" == "0000000000000000000000000000000000000000" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_version="$(git show "${base_sha}:misc/helm/pantry/Chart.yaml" 2>/dev/null | awk -F': ' '/^version:/ {print $2; exit}')"
          head_version="$(git show "${head_sha}:misc/helm/pantry/Chart.yaml" 2>/dev/null | awk -F': ' '/^version:/ {print $2; exit}')"

          if [[ -n "${base_version}" && -n "${head_version}" && "${base_version}" != "${head_version}" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  helm:
    needs: [tests_backend, tests_frontend, chart_version]
    if: needs.chart_version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Helm registry login
        if: github.event_name != 'pull_request'
        run: |
          helm registry login registry-1.docker.io \
            --username "${{ secrets.DOCKERHUB_USERNAME }}" \
            --password "${{ secrets.DOCKERHUB_TOKEN }}"

      - name: Package chart
        run: |
          helm package misc/helm/pantry --destination dist

      - name: Push chart to Docker Hub
        if: github.event_name != 'pull_request'
        run: |
          helm push dist/*.tgz oci://registry-1.docker.io/klausmeyer
