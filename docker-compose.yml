services:
  postgres:
    image: postgres:17
    container_name: pantry-postgres
    environment:
      POSTGRES_DB: pantry
      POSTGRES_USER: pantry
      POSTGRES_PASSWORD: pantry
    ports:
      - "5432:5432"
    volumes:
      - pantry_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pantry -d pantry"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: pantry-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - pantry_minio_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pantry-backend
    environment:
      HTTP_ADDR: :4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pantry
      DB_USER: pantry
      DB_PASSWORD: pantry
      DB_SSLMODE: disable
      S3_ENDPOINT: http://minio:9000
      S3_REGION: eu-central-1
      S3_BUCKET: pantry
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_USE_PATH_STYLE: "true"
      SEED_DEV_DATA: "false"
      SEED_DEV_DATA_COUNT: 100
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pantry-frontend
    environment:
      BACKEND_UPSTREAM: backend:4000
    depends_on:
      backend:
        condition: service_started
    ports:
      - "8080:80"

volumes:
  pantry_pg_data:
  pantry_minio_data:
