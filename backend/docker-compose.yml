services:
  postgres:
    image: postgres:17
    container_name: pantry-postgres
    environment:
      POSTGRES_DB: pantry
      POSTGRES_USER: pantry
      POSTGRES_PASSWORD: pantry
    ports:
      - "5432:5432"
    volumes:
      - pantry_pg_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: pantry-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - pantry_minio_data:/data

volumes:
  pantry_pg_data:
  pantry_minio_data:
